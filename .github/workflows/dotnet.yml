name: .NET CI/CD
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore PackagingTenderDecisionEngine.sln
    - name: Build
      run: dotnet build PackagingTenderDecisionEngine.sln --configuration Release --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
